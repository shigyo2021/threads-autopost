name: Process Scheduled Posts

on:
  schedule:
    # 30分ごとにチェック（JST 0:00〜23:30）
    - cron: '0,30 * * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check queue file exists
        id: check
        run: |
          if [ -f "output/post_queue.json" ]; then
            PENDING=$(python3 -c "
          import json
          with open('output/post_queue.json') as f:
              q = json.load(f)
          print(sum(1 for e in q if e.get('status') == 'pending'))
          ")
            echo "pending=$PENDING" >> $GITHUB_OUTPUT
            echo "📋 Pending posts: $PENDING"
          else
            echo "pending=0" >> $GITHUB_OUTPUT
            echo "📭 No queue file"
          fi

      - name: Set up Python
        if: steps.check.outputs.pending != '0'
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check.outputs.pending != '0'
        run: pip install -r requirements.txt

      - name: Process scheduled posts
        if: steps.check.outputs.pending != '0'
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python process_queue.py

      - name: Commit queue changes
        if: steps.check.outputs.pending != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/post_queue.json output/posts_log.jsonl || true
          git diff --staged --quiet || git commit -m "Process scheduled posts [bot]"
          git push || true
